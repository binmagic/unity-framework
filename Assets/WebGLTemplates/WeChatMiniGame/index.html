<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>{{{ PRODUCT_NAME }}}</title>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; }
    #canvas { width: 100vw; height: 100vh; display: block; }
    #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%;
               display: flex; align-items: center; justify-content: center;
               background: #000; color: #fff; font-size: 18px; z-index: 999; }
    #loading .bar { width: 60%; height: 4px; background: #333; border-radius: 2px; margin-top: 20px; }
    #loading .bar .fill { height: 100%; background: #07c160; border-radius: 2px; width: 0%; transition: width 0.3s; }
  </style>
</head>
<body>
  <div id="loading">
    <div style="text-align:center">
      <div>加载中...</div>
      <div class="bar"><div class="fill" id="progress"></div></div>
    </div>
  </div>
  <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

  <script>
    // 微信小游戏环境下由 game.js 加载
    // 此文件作为 WebGL 构建的模板占位
  </script>
</body>
</html>
